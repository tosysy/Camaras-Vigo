<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cámaras Meteorológicas de Galicia</title>
  <style>
    :root {
      --bg:          #0A0A0F;
      --card:        #12121A;
      --border:      rgba(255,255,255,0.06);
      --text:        #D0D0E0;
      --text-dim:    #484860;
      --header-bg:   rgba(10,10,15,0.90);
      --meteo:       #60C0FF;
      --meteo-dim:   rgba(96,192,255,0.10);
      --meteo-border:rgba(96,192,255,0.22);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(96,192,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,192,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border-bottom: 1px solid var(--border);
      height: 58px;
      display: flex; align-items: center;
      padding: 0 18px; gap: 12px;
    }
    
    .btn-back {
      background: none; border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px; color: var(--text-dim);
      width: 36px; height: 36px; cursor: pointer;
      font-size: 17px; display: grid; place-items: center;
      transition: color 0.2s, border-color 0.2s;
      padding: 0;
      text-decoration: none;
    }
    .btn-back:hover { color: var(--meteo); border-color: var(--meteo-border); }

    .logo {
      display: flex; align-items: center; gap: 9px;
      font-weight: 700; font-size: 1rem;
      letter-spacing: 0.06em; color: #fff; white-space: nowrap;
    }
    .logo-box {
      width: 30px; height: 30px;
      background: var(--meteo-dim); border: 1px solid var(--meteo-border);
      border-radius: 8px; display: grid; place-items: center; font-size: 15px;
    }
    .logo em { color: var(--meteo); font-style: normal; }

    .live-chip {
      display: flex; align-items: center; gap: 5px;
      font-family: monospace; font-size: 0.65rem; color: var(--meteo);
      background: var(--meteo-dim); border: 1px solid var(--meteo-border);
      padding: 3px 10px; border-radius: 100px;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--meteo); box-shadow: 0 0 6px var(--meteo);
      animation: blink 1.3s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    .spacer { flex: 1; }

    .btn-refresh {
      background: var(--meteo); color: #000;
      border: none; border-radius: 8px;
      padding: 7px 16px;
      font-weight: 700; font-size: 0.78rem; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .btn-refresh:hover { opacity: 0.82; }

    .btn-sections-group { display: flex; gap: 4px; }
    .btn-sections-ctrl {
      background: none; border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px; color: var(--text-dim);
      width: 36px; height: 36px; cursor: pointer;
      font-size: 16px; display: grid; place-items: center;
      transition: color 0.2s, border-color 0.2s; padding: 0;
    }
    .btn-sections-ctrl:hover { color: var(--meteo); border-color: var(--meteo-border); }

    /* ─── TOAST ──────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(18,18,26,0.96); border: 1px solid var(--meteo-border);
      color: var(--meteo); font-family: monospace; font-size: 0.78rem;
      padding: 9px 20px; border-radius: 100px;
      z-index: 900; pointer-events: none;
      opacity: 0; transition: opacity 0.3s;
      white-space: nowrap; max-width: 90vw; text-align: center;
    }
    #toast.show { opacity: 1; }

    /* ─── MAIN ───────────────────────────────────────── */
    main { position: relative; z-index: 1; padding: 16px; }

    .stats-bar {
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 20px;
      font-family: monospace; font-size: 0.74rem;
      color: var(--text-dim); flex-wrap: wrap;
    }
    .stats-bar em { color: var(--meteo); font-style: normal; font-weight: 700; }
    .stats-bar span { margin: 0 5px; }

    /* ─── SECTIONS ───────────────────────────────────── */
    #sections-container { display: flex; flex-direction: column; gap: 24px; }

    .cam-section.section-empty { display: none; }

    .section-header {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .section-title {
      font-family: monospace; font-size: 0.8rem; font-weight: 700;
      color: var(--text); letter-spacing: 0.07em; flex: 1;
    }
    .section-badge {
      font-family: monospace; font-size: 0.58rem; font-weight: 700;
      padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    }
    .section-badge.meteo {
      color: var(--meteo); background: var(--meteo-dim); border: 1px solid var(--meteo-border);
    }
    .section-count {
      font-family: monospace; font-size: 0.68rem; color: var(--text-dim); white-space: nowrap;
    }
    .section-header { cursor: pointer; user-select: none; }
    .section-header:hover { background: rgba(255,255,255,0.05); }
    .section-chevron {
      font-size: 0.65rem; color: var(--text-dim); flex-shrink: 0;
      transition: transform 0.25s ease; margin-left: 4px;
    }
    .cam-section.collapsed .section-chevron { transform: rotate(-90deg); }
    .cam-section.collapsed .cam-grid { max-height: 0 !important; opacity: 0; pointer-events: none; }

    /* ─── CAMERA GRID ────────────────────────────────── */
    .cam-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
      overflow: hidden;
      max-height: 9999px;
      transition: max-height 0.35s ease, opacity 0.2s ease;
      opacity: 1;
    }

    /* ─── CAMERA CARD ────────────────────────────────── */
    .cam-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s;
    }
    .cam-card:hover {
      border-color: rgba(96,192,255,0.28);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(96,192,255,0.07);
    }
    .cam-card.hidden { display: none; }

    .cam-thumb {
      position: relative; aspect-ratio: 16/9;
      background: #000; overflow: hidden;
    }
    .cam-thumb img { width:100%; height:100%; object-fit:cover; display:block; }

    .meteo-live-badge {
      position: absolute; top: 8px; left: 8px;
      display: flex; align-items: center; gap: 4px;
      background: rgba(0,0,0,0.70); border: 1px solid var(--meteo-border);
      border-radius: 5px; padding: 3px 7px;
      font-family: monospace; font-size: 0.6rem; color: var(--meteo);
      backdrop-filter: blur(4px);
    }
    .meteo-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--meteo); box-shadow: 0 0 6px var(--meteo);
      animation: blink 1.3s infinite;
    }

    .cam-footer {
      padding: 9px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cam-id  { font-family: monospace; font-size: 0.75rem; font-weight: 600; color: var(--text); }
    .cam-loc { font-family: monospace; font-size: 0.65rem; color: var(--text-dim); }

    @keyframes camFlash {
      0%   { border-color: rgba(96,192,255,0.7); box-shadow: 0 0 20px rgba(96,192,255,0.22); }
      100% { border-color: var(--border); box-shadow: none; }
    }
    .cam-card.cam-updated { animation: camFlash 1.4s ease-out forwards; }

    /* ─── MODAL ──────────────────────────────────────── */
    #modal {
      display: none;
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      flex-direction: column;
    }
    #modal.open { display: flex; }

    .modal-topbar {
      display: flex; align-items: center;
      padding: 10px 14px; gap: 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.85);
      flex-shrink: 0;
    }
    .modal-cam-label {
      font-family: monospace; font-size: 0.84rem;
      color: #fff; font-weight: 600;
    }
    .modal-cam-label em { color: var(--meteo); font-style: normal; }

    .modal-spacer { flex: 1; }

    .icon-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 7px; color: #fff;
      width: 34px; height: 34px; cursor: pointer;
      font-size: 15px; display: grid; place-items: center;
      transition: background 0.15s; padding: 0; line-height: 1;
      font-family: monospace;
    }
    .icon-btn:hover:not(:disabled) { background: rgba(255,255,255,0.16); }
    .icon-btn:disabled { opacity: 0.25; cursor: default; }

    .modal-body {
      flex: 1; display: flex; align-items: center;
      overflow: hidden; position: relative;
    }
    .nav-arrow {
      flex-shrink: 0; width: 56px; height: 100%;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.35); font-size: 44px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
      padding: 0;
    }
    .nav-arrow:hover:not(:disabled) { color: var(--meteo); background: rgba(96,192,255,0.04); }
    .nav-arrow:disabled { opacity: 0.12; cursor: default; }

    .img-wrapper {
      flex: 1; height: 100%;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      cursor: default; user-select: none; position: relative;
    }
    #modal-img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; display: block;
      transform-origin: center center;
      will-change: transform;
    }
    .zoom-chip {
      position: absolute; bottom: 12px; right: 12px;
      font-family: monospace; font-size: 0.72rem; color: var(--meteo);
      background: var(--meteo-dim); border: 1px solid var(--meteo-border);
      padding: 3px 10px; border-radius: 100px;
      pointer-events: none;
      opacity: 0; transition: opacity 0.3s;
    }
    .zoom-chip.visible { opacity: 1; }

    /* ─── SEARCH ─────────────────────────────────────── */
    .search-wrap { position: relative; display: flex; align-items: center; }
    #search-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px; color: var(--text);
      font-family: monospace; font-size: 0.76rem;
      padding: 6px 14px; outline: none;
      width: 220px; transition: border-color 0.2s, width 0.25s;
    }
    #search-input::placeholder { color: var(--text-dim); }
    #search-input:focus { border-color: var(--meteo-border); width: 280px; }
  </style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────── -->
<header>
  <a href="index.html" class="btn-back" title="Volver al inicio">‹</a>
  <div class="logo">
    <div class="logo-box">🌤️</div>
    METEO&nbsp;<em>GALICIA</em>
  </div>
  <div class="live-chip"><span class="dot"></span> EN DIRECTO</div>
  <div class="spacer"></div>
  <div class="search-wrap">
    <input type="search" id="search-input" placeholder="🔍  buscar concello, provincia..."
           oninput="applySearch()" autocomplete="off">
  </div>
  <div class="btn-sections-group">
    <button class="btn-sections-ctrl" onclick="collapseAll()" title="Contraer todo">⊟</button>
    <button class="btn-sections-ctrl" onclick="expandAll()"   title="Expandir todo">⊞</button>
  </div>
  <button class="btn-refresh" onclick="manualRefresh()">⟳ Actualizar</button>
</header>

<div id="toast"></div>

<!-- ── MAIN ──────────────────────────────────────────── -->
<main>
  <div class="stats-bar">
    <em id="stat-meteo">0</em> cámaras meteogalicia
    <span>·</span> última sync: <em id="stat-time">--:--:--</em>
  </div>
  <div id="sections-container">
     <p style="text-align:center; font-family:monospace; color: var(--text-dim);">Cargando cámaras...</p>
  </div>
</main>

<!-- ── MODAL ─────────────────────────────────────────── -->
<div id="modal">
  <div class="modal-topbar">
    <div class="modal-cam-label">--</div>
    <div class="modal-spacer"></div>
    <button class="icon-btn" id="btn-zoom-out" onclick="zoom(-0.5)" title="Alejar (–)">&#8722;</button>
    <button class="icon-btn" id="btn-zoom-in"  onclick="zoom(+0.5)" title="Acercar (+)">&#43;</button>
    <button class="icon-btn" onclick="resetZoom()" title="Restablecer zoom" style="font-size:11px">1:1</button>
    <button class="icon-btn" onclick="closeModal()" title="Cerrar (Esc)" style="font-size:17px">&#10005;</button>
  </div>

  <div class="modal-body">
    <button class="nav-arrow" id="btn-prev" onclick="navigate(-1)" title="Anterior (←)">&#8249;</button>
    <div class="img-wrapper" id="img-wrapper">
      <img id="modal-img" src="" alt="Cámara en directo">
      <div class="zoom-chip" id="zoom-chip">100%</div>
    </div>
    <button class="nav-arrow" id="btn-next" onclick="navigate(+1)" title="Siguiente (→)">&#8250;</button>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────
  const METEO_URL      = 'https://servizos.meteogalicia.gal/mgrss/observacion/jsonCamaras.action';
  const PROVINCE_ORDER = ['A Coruña', 'Lugo', 'Ourense', 'Pontevedra'];

  // ── STATE ────────────────────────────────────────────
  let meteoCameras    = [];
  let allModalCams    = [];
  let currentIdx      = -1;
  
  // Zoom / pan
  let zoomLevel = 1, panX = 0, panY = 0;
  let isPanning = false, startX = 0, startY = 0;
  let touchDist = 0;

  function sanitizeId(str) {
    return (str || '').replace(/[^a-zA-Z0-9_-]/g, '_');
  }

  function collapseAll() {
    document.querySelectorAll('.cam-section:not(.section-empty)').forEach(sec => {
      sec.classList.add('collapsed');
      if (sec.id) localStorage.setItem('sec_collapsed_' + sec.id, '1');
    });
  }

  function expandAll() {
    document.querySelectorAll('.cam-section').forEach(sec => {
      sec.classList.remove('collapsed');
      if (sec.id) localStorage.removeItem('sec_collapsed_' + sec.id);
    });
  }

  function toggleSection(header) {
    const sec = header.closest('.cam-section');
    sec.classList.toggle('collapsed');
    const key = 'sec_collapsed_' + sec.id;
    sec.classList.contains('collapsed')
      ? localStorage.setItem(key, '1')
      : localStorage.removeItem(key);
  }

  // ── BUILD SECTIONS ───────────────────────────────────
  function buildSections() {
    loadMeteoSections();
    updateStats();
  }

  // Fetch JSON superando CORS: localhost → /meteo local; file:// → proxies públicos
  async function fetchMeteoJson() {
    const candidates = window.location.hostname === 'localhost'
      ? ['/meteo']
      : [
          METEO_URL,
          'https://corsproxy.io/?' + encodeURIComponent(METEO_URL),
          'https://api.allorigins.win/get?url=' + encodeURIComponent(METEO_URL)
        ];
    for (const url of candidates) {
      try {
        const r = await fetch(url);
        if (!r.ok) continue;
        const j = await r.json();
        // allorigins envuelve la respuesta en { contents: "..." }
        const parsed = j.listaCamaras ? j : (j.contents ? JSON.parse(j.contents) : null);
        if (parsed?.listaCamaras) return parsed;
      } catch {}
    }
    return null;
  }

  async function loadMeteoSections() {
    try {
      const data = await fetchMeteoJson();
      if (!data) { 
        console.warn('MeteoGalicia: no se pudo cargar el JSON'); 
        document.getElementById('sections-container').innerHTML = `<p style="text-align:center; font-family:monospace; color: #f88;">Error cargando datos de MeteoGalicia.</p>`;
        return;
      }
      meteoCameras = data.listaCamaras || [];

      // Group by province → concello
      const byProvince = {};
      for (const cam of meteoCameras) {
        const prov = cam.provincia || 'Outras';
        const conc = cam.concello  || 'Outros';
        if (!byProvince[prov]) byProvince[prov] = {};
        if (!byProvince[prov][conc]) byProvince[prov][conc] = [];
        byProvince[prov][conc].push(cam);
      }

      const container = document.getElementById('sections-container');
      container.innerHTML = ''; // Clear loading message
      const provOrder = PROVINCE_ORDER.filter(p => byProvince[p])
        .concat(Object.keys(byProvince).filter(p => !PROVINCE_ORDER.includes(p)).sort());

      for (const prov of provOrder) {
        const concellos = Object.keys(byProvince[prov]).sort();
        for (const conc of concellos) {
          const cams = byProvince[prov][conc].sort((a, b) =>
            a.nomeCamara.localeCompare(b.nomeCamara, 'gl'));
          container.appendChild(createMeteoSection(prov, conc, cams));
        }
      }

      updateStats();
      rebuildModalCams();
      checkAllForChanges(); // First update
    } catch (e) {
      console.warn('MeteoGalicia error:', e);
      document.getElementById('sections-container').innerHTML = `<p style="text-align:center; font-family:monospace; color: #f88;">Error procesando datos de MeteoGalicia.</p>`;
    }
  }

  function createMeteoSection(provincia, concello, cams) {
    const sec = document.createElement('div');
    sec.className = 'cam-section';
    sec.id = 'section-meteo-' + sanitizeId(provincia + '_' + concello);
    sec.dataset.provincia = provincia;
    sec.dataset.concello  = concello;

    const cardsHtml = cams.map(cam => {
      const safeId  = sanitizeId(String(cam.identificador));
      const thumbUrl = (cam.imaxeCamaraMini || cam.imaxeCamara || '');
      const sep = thumbUrl.includes('?') ? '&' : '?';
      return `
        <div class="cam-card" data-type="meteo" data-meteo-id="${cam.identificador}" onclick="openModalFor(this)">
          <div class="cam-thumb">
            <img id="img_meteo_${safeId}" src="${thumbUrl}${sep}t=${Date.now()}" loading="lazy" alt="${cam.nomeCamara}">
            <div class="meteo-live-badge"><span class="meteo-dot"></span> METEO</div>
          </div>
          <div class="cam-footer">
            <span class="cam-id" style="font-size:0.7rem;max-width:70%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cam.nomeCamara}</span>
            <span class="cam-loc">${concello}</span>
          </div>
        </div>`;
    }).join('');

    sec.innerHTML = `
      <div class="section-header" onclick="toggleSection(this)">
        <span class="section-title">📍 ${concello.toUpperCase()}</span>
        <span class="section-badge meteo">🌤 METEO</span>
        <span class="section-count">${provincia} · ${cams.length} cam${cams.length !== 1 ? 's' : ''}</span>
        <span class="section-chevron">▾</span>
      </div>
      <div class="cam-grid">${cardsHtml}</div>`;

    if (localStorage.getItem('sec_collapsed_' + sec.id)) sec.classList.add('collapsed');
    return sec;
  }

  // ── MODAL NAVIGATION ─────────────────────────────────
  function rebuildModalCams() {
    allModalCams = [];
    document.querySelectorAll('.cam-card:not(.hidden)').forEach(card => {
      const meteoId = card.dataset.meteoId;
      const cam = meteoCameras.find(c => String(c.identificador) === meteoId);
      if (cam) allModalCams.push({ type: 'meteo', cam });
    });
  }

  function openModalFor(cardEl) {
    const meteoId = cardEl.dataset.meteoId;
    const idx = allModalCams.findIndex(c => c.type === 'meteo' && String(c.cam.identificador) === meteoId);
    if (idx < 0) { rebuildModalCams(); openModalFor(cardEl); return; }
    currentIdx = idx;
    document.getElementById('modal').classList.add('open');
    loadModalCamera(allModalCams[idx]);
  }

  function loadModalCamera(entry) {
    if (!entry) return;
    resetZoom();
    const cam = entry.cam;
    document.querySelector('.modal-cam-label').innerHTML =
        '<em>' + cam.nomeCamara + '</em> &nbsp;·&nbsp; ' + cam.concello;
    const fullUrl = cam.imaxeCamara || '';
    const sep = fullUrl.includes('?') ? '&' : '?';
    document.getElementById('modal-img').src = fullUrl + sep + 't=' + Date.now();
    updateNavBtns();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    currentIdx = -1;
  }

  function navigate(dir) {
    const n = currentIdx + dir;
    if (n >= 0 && n < allModalCams.length) {
      currentIdx = n;
      loadModalCamera(allModalCams[currentIdx]);
    }
  }

  function updateNavBtns() {
    document.getElementById('btn-prev').disabled = currentIdx <= 0;
    document.getElementById('btn-next').disabled = currentIdx >= allModalCams.length - 1;
  }

  // ── ZOOM ─────────────────────────────────────────────
  function zoom(delta) {
    zoomLevel = Math.max(1, Math.min(6, zoomLevel + delta));
    if (zoomLevel === 1) { panX = 0; panY = 0; }
    applyTransform();
  }

  function resetZoom() { zoomLevel = 1; panX = 0; panY = 0; applyTransform(); }

  function applyTransform() {
    const img = document.getElementById('modal-img');
    img.style.transform = `scale(${zoomLevel}) translate(${panX/zoomLevel}px, ${panY/zoomLevel}px)`;
    const chip = document.getElementById('zoom-chip');
    chip.textContent = Math.round(zoomLevel * 100) + '%';
    chip.classList.toggle('visible', zoomLevel !== 1);
    const w = document.getElementById('img-wrapper');
    w.style.cursor = zoomLevel > 1 ? (isPanning ? 'grabbing' : 'grab') : 'default';
  }

  // Mouse drag to pan
  const wrapper = document.getElementById('img-wrapper');
  wrapper.addEventListener('mousedown', e => {
    if (zoomLevel > 1) { isPanning = true; startX = e.clientX - panX; startY = e.clientY - panY; e.preventDefault(); }
  });
  document.addEventListener('mousemove', e => {
    if (isPanning) { panX = e.clientX - startX; panY = e.clientY - startY; applyTransform(); }
  });
  document.addEventListener('mouseup', () => { isPanning = false; });

  // Scroll wheel zoom
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    zoom(e.deltaY < 0 ? 0.3 : -0.3);
  }, { passive: false });

  // Touch pinch zoom
  wrapper.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      touchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: true });

  wrapper.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      zoom((d - touchDist) / 200);
      touchDist = d;
    }
  }, { passive: false });

  // Close on backdrop click
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!document.getElementById('modal').classList.contains('open')) return;
    if (e.key === 'Escape')     closeModal();
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(+1);
    if (e.key === '+' || e.key === '=') zoom(+0.5);
    if (e.key === '-') zoom(-0.5);
    if (e.key === '0') resetZoom();
  });

  // ── CHANGE DETECTION ─────────────────────────────────
  function updateMeteoImg(cam) {
    const meteoId = cam.identificador;
    const safeId  = sanitizeId(String(meteoId));
    const fullUrl = cam.imaxeCamara || '';
    if (!fullUrl) return;
    const sep    = fullUrl.includes('?') ? '&' : '?';
    const newSrc = fullUrl + sep + 't=' + Date.now();

    const imgEl = document.getElementById('img_meteo_' + safeId);
    if (imgEl) {
      imgEl.src = newSrc;
      const card = imgEl.closest('.cam-card');
      if (card) { card.classList.remove('cam-updated'); void card.offsetWidth; card.classList.add('cam-updated'); }
    }
    if (currentIdx >= 0 && allModalCams[currentIdx]?.type === 'meteo' &&
        String(allModalCams[currentIdx].cam.identificador) === String(meteoId)) {
        // Also update modal image if it's open
        document.getElementById('modal-img').src = newSrc;
    }
  }

  function checkAllForChanges() {
    meteoCameras.forEach(updateMeteoImg);
    updateStats();
  }

  // ── STATS ─────────────────────────────────────────────
  function updateStats() {
    document.getElementById('stat-meteo').textContent = meteoCameras.length;
    document.getElementById('stat-time').textContent  = new Date().toLocaleTimeString('es-ES');
  }

  // ── SEARCH ───────────────────────────────────────────
  function applySearch() {
    const q = (document.getElementById('search-input').value || '').toLowerCase().trim();

    document.querySelectorAll('.cam-card').forEach(card => {
      let match = false;
      if (!q) {
        match = true;
      } else {
        const meteoId = card.dataset.meteoId;
        const cam = meteoCameras.find(c => String(c.identificador) === meteoId);
        if (cam) {
          match = (cam.nomeCamara  || '').toLowerCase().includes(q) ||
                  (cam.concello    || '').toLowerCase().includes(q) ||
                  (cam.provincia   || '').toLowerCase().includes(q) ||
                  String(cam.identificador).includes(q);
        }
      }
      card.classList.toggle('hidden', !match);
    });

    // Hide sections with no visible cards
    document.querySelectorAll('.cam-section').forEach(sec => {
      const hasVisible = sec.querySelector('.cam-card:not(.hidden)') !== null;
      sec.classList.toggle('section-empty', !hasVisible);
    });

    rebuildModalCams();
  }

  function manualRefresh() {
    if (document.getElementById('modal').classList.contains('open')) closeModal();
    meteoCameras    = [];
    allModalCams    = [];
    document.getElementById('sections-container').innerHTML = 
        `<p style="text-align:center; font-family:monospace; color: var(--text-dim);">Cargando cámaras...</p>`;
    buildSections();
  }

  // ── TOAST ────────────────────────────────────────────
  let _toastTimer = null;
  function showToast(msg, ms = 2800) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
  }

  // ── START ─────────────────────────────────────────────
  buildSections();
  setInterval(checkAllForChanges, 60 * 1000); // Refresh every 60 seconds

</script>
</body>
</html>
