<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cámaras de Galicia</title>
  <style>
    :root {
      --neon:        #00FF88;
      --bg:          #0A0A0F;
      --card:        #12121A;
      --border:      rgba(255,255,255,0.06);
      --text:        #D0D0E0;
      --text-dim:    #484860;
      --meteo:       #60C0FF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #fff;
      text-align: center;
      font-family: monospace;
    }
    .title em { color: var(--neon); font-style: normal; }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .option-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 280px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .option-card:hover {
      transform: translateY(-4px);
    }

    .option-card.traffic:hover {
      border-color: rgba(0,255,136,0.35);
      box-shadow: 0 8px 32px rgba(0,255,136,0.08);
    }
    .option-card.weather:hover {
      border-color: rgba(96,192,255,0.35);
      box-shadow: 0 8px 32px rgba(96,192,255,0.08);
    }

    .card-icon {
      font-size: 48px;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
    }
    .card-title .traffic-em { color: var(--neon); }
    .card-title .weather-em { color: var(--meteo); }

  </style>
</head>
<body>

  <h1 class="title">CÁMARAS <em>GALICIA</em></h1>

  <div class="card-container">
    <a href="trafico_vigo.html" class="option-card traffic">
      <div class="card-icon">📷</div>
      <div class="card-title">Cámaras de Tráfico<br><span class="traffic-em">VIGO</span></div>
    </a>
    <a href="meteo_galicia.html" class="option-card weather">
      <div class="card-icon">🌤️</div>
      <div class="card-title">Cámaras Meteorológicas<br><span class="weather-em">GALICIA</span></div>
    </a>
  </div>

</body>
</html>
